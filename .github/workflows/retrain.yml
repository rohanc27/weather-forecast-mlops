name: Daily retrain and drift monitoring

on:
  schedule:
    # Runs daily at 13:00 UTC (6am Pacific) -- after Open-Meteo's data
    # for "yesterday" is fully settled
    - cron: "0 13 * * *"
  workflow_dispatch: {}  # allows manual triggering from the Actions tab

permissions:
  contents: write  # needed to commit updated models/logs back to the repo

jobs:
  retrain-and-monitor:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install system dependencies for Prophet
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential

      - name: Install Python dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Pull latest weather data
        run: python -m src.data.pull_weather --force

      - name: Retrain all city models
        run: python -m src.models.train_forecast --city all

      - name: Evaluate drift / update monitoring logs
        run: python -m src.monitoring.evaluate_drift

      - name: Commit updated models and logs
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/raw models monitoring
          git diff --staged --quiet || git commit -m "Automated daily retrain and drift check $(date -u +'%Y-%m-%d')"
          git push
